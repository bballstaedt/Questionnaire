.camino-hero {
  --camino-loop: 28s;
  --camino-blue: #123f8b;
  --camino-blue-2: #1e5dc2;
  --camino-blue-light: #8fc7ff;
  --camino-glow: #bfe3ff;
  --camino-white: #ffffff;
  --camino-smoke: rgba(255, 255, 255, 0.48);
  --camino-smoke-2: rgba(220, 235, 255, 0.28);
  --camino-orange: #ff7a59;
  --camino-orange-soft: rgba(255, 122, 89, 0.7);
  --camino-vignette: rgba(9, 26, 58, 0.18);

  position: relative;
  width: 100%;
  overflow: hidden;
  background: #dceafb;
}

.camino-hero__svg {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1640 / 920;
  min-height: 420px;
  max-height: 82svh;
}

.camino-hero__sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

.camino-hero__scene {
  opacity: 0;
  transform-origin: center center;
}

/* Scene 1 visible during opening part of the master timeline */
.camino-hero__scene--1 {
  opacity: 1;
  animation:
    caminoScene1Visibility var(--camino-loop) linear infinite,
    caminoScene1Push var(--camino-loop) ease-in-out infinite;
}

/* Background scene layers */
.camino-hero__scene--2 {
  opacity: 0;
  animation:
    caminoScene2Visibility var(--camino-loop) linear infinite,
    caminoScene2Push var(--camino-loop) ease-in-out infinite;
}

.camino-hero__scene--3,
.camino-hero__scene--4,
.camino-hero__scene--5,
.camino-hero__scene--6 {
  opacity: 0;
}

.camino-hero__overlay--scene1 {
  opacity: 1;
  animation: caminoScene1Visibility var(--camino-loop) linear infinite;
}

.camino-hero__smoke ellipse {
  fill: var(--camino-smoke);
}

.camino-hero__smoke--1 {
  opacity: 0.7;
  animation: caminoSmokeRise1 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__smoke--2 {
  fill: var(--camino-smoke-2);
  opacity: 0.58;
  animation: caminoSmokeRise2 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__dizzy-ring path {
  fill: none;
  stroke: rgba(34, 72, 128, 0.55);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 10 18;
}

.camino-hero__dizzy-ring {
  transform-origin: 1210px 275px;
  animation: caminoDizzyOrbit var(--camino-loop) linear infinite;
}

.camino-hero__stars .camino-hero__star path {
  fill: var(--camino-orange);
}

.camino-hero__star {
  opacity: 0.85;
  transform-box: fill-box;
  transform-origin: center center;
}

.camino-hero__star--1 {
  transform: translate(1145px, 226px);
  animation: caminoStarPulse1 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__star--2 {
  transform: translate(1265px, 225px);
  animation: caminoStarPulse2 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__star--3 {
  transform: translate(1360px, 258px);
  animation: caminoStarPulse3 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__pain-lines path {
  fill: none;
  stroke: var(--camino-orange-soft);
  stroke-width: 7;
  stroke-linecap: round;
}

.camino-hero__pain-lines {
  animation: caminoPainPulse var(--camino-loop) ease-in-out infinite;
}

.camino-hero__road-glow {
  opacity: 0;
  animation: caminoRoadReveal var(--camino-loop) ease-in-out infinite;
}

.camino-hero__road-stroke {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.camino-hero__road-stroke--outer {
  stroke: rgba(182, 222, 255, 0.55);
  stroke-width: 24;
}

.camino-hero__road-stroke--inner {
  stroke: rgba(255, 255, 255, 0.7);

}

.camino-hero__road-mask-path {

.camino-hero__vignette {

  opacity: 1;
  fill: transparent;
  box-shadow: none;
}

.camino-hero__vignette {
  fill: rgba(0, 0, 0, 0);
}

.camino-hero__overlay--scene1::before {
  content: "";
}

/* Reduced-motion label hidden in normal mode */
.camino-hero__reduced-label {
  opacity: 0;

}

.camino-hero__reduced-label rect {

/* ---------- Timeline keyframes ---------- */

/* Scene 1 occupies the first portion of the 20-second timeline */


@keyframes caminoScene1Push {
  0% {
    transform: scale(1) translateX(0px) translateY(0px);
  }
  8% {
    transform: scale(1.014) translateX(-6px) translateY(-2px);
  }
  16% {
    transform: scale(1.026) translateX(-14px) translateY(-6px);
  }
  20% {
    transform: scale(1.04) translateX(-24px) translateY(-10px);
  }
  100% {
    transform: scale(1.04) translateX(-24px) translateY(-10px);
  }
}


@keyframes caminoPainPulse {
  0%,

    transform: scale(0.92);

    transform: scale(1.1);
  }
  100% {
