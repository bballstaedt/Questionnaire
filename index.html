<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camino SLC — Injured in an Accident?</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #ffffff; color: #1A3D6B; }

      header {
        background: #1A3D6B;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      
      header img { height: 64px; }
      header a { text-decoration: none; }

      nav { display: flex; gap: 24px; }
      nav a {
        color: #ffffff;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 15px;
        font-weight: 500;
        opacity: 0.85;
      }
      nav a:hover { opacity: 1; }

      .lang-btn {
        color: #ffffff;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        font-weight: 600;
        border: 1.5px solid rgba(255,255,255,0.5);
        padding: 6px 14px;
        border-radius: 20px;
        opacity: 0.9;
      }
      .lang-btn:hover { opacity: 1; border-color: #ffffff; }

      .intro {
        max-width: 720px;
        margin: 40px auto 0;
        padding: 0 24px;
        text-align: center;
      }
      .intro h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
      .intro p  { font-size: 16px; line-height: 1.6; color: #444; }

      .form-wrap {
        max-width: 720px;
        margin: 32px auto 60px;
        padding: 0 24px;
      }

      footer {
        text-align: center;
        padding: 24px;
        font-size: 13px;
        color: #888;
        border-top: 1px solid #eee;
      }
      footer a { color: #1A3D6B; text-decoration: none; }

@media (max-width: 640px) {
      header { padding: 12px 16px; }
      header img { height: 48px; }   /* was 64px — the biggest space win */
      nav { gap: 14px; }             /* was 24px */
      nav a { font-size: 14px; }     /* was 15px */
    }

.camino-hero {
  --camino-loop: 20s;
  --camino-blue: #123f8b;
  --camino-blue-2: #1e5dc2;
  --camino-blue-light: #8fc7ff;
  --camino-glow: #bfe3ff;
  --camino-white: #ffffff;
  --camino-smoke: rgba(255, 255, 255, 0.48);
  --camino-smoke-2: rgba(220, 235, 255, 0.28);
  --camino-orange: #ff7a59;
  --camino-orange-soft: rgba(255, 122, 89, 0.7);
  --camino-vignette: rgba(9, 26, 58, 0.18);

  position: relative;
  width: 100%;
  overflow: hidden;
  background: #dceafb;
}

.camino-hero__svg {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1640 / 920;
  min-height: 420px;
  max-height: 82svh;
}

.camino-hero__sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

.camino-hero__scene {
  opacity: 0;
  transform-origin: center center;
}

/* Scene 1 visible during opening part of the master timeline */
.camino-hero__scene--1 {
  opacity: 1;
  animation:
    caminoScene1Visibility var(--camino-loop) linear infinite,
    caminoScene1Push var(--camino-loop) ease-in-out infinite;
}

/* Hidden placeholders for future scenes */
.camino-hero__scene--2 {
  opacity: 0;
  animation:
    caminoScene2Visibility var(--camino-loop) linear infinite,
    caminoScene2Push var(--camino-loop) ease-in-out infinite;
}

.camino-hero__scene--3,
.camino-hero__scene--4,
.camino-hero__scene--5,
.camino-hero__scene--6 {
  opacity: 0;
}

.camino-hero__overlay--scene1 {
  opacity: 1;
  animation: caminoScene1Visibility var(--camino-loop) linear infinite;
}

.camino-hero__smoke ellipse {
  fill: var(--camino-smoke);
}

.camino-hero__smoke--1 {
  opacity: 0.7;
  animation: caminoSmokeRise1 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__smoke--2 {
  fill: var(--camino-smoke-2);
  opacity: 0.58;
  animation: caminoSmokeRise2 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__dizzy-ring path {
  fill: none;
  stroke: rgba(34, 72, 128, 0.55);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 10 18;
}

.camino-hero__dizzy-ring {
  transform-origin: 1210px 275px;
  animation: caminoDizzyOrbit var(--camino-loop) linear infinite;
}

.camino-hero__stars .camino-hero__star path {
  fill: var(--camino-orange);
}

.camino-hero__star {
  opacity: 0.85;
  transform-box: fill-box;
  transform-origin: center center;
}

.camino-hero__star--1 {
  transform: translate(1145px, 226px);
  animation: caminoStarPulse1 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__star--2 {
  transform: translate(1265px, 225px);
  animation: caminoStarPulse2 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__star--3 {
  transform: translate(1360px, 258px);
  animation: caminoStarPulse3 var(--camino-loop) ease-in-out infinite;
}

.camino-hero__pain-lines path {
  fill: none;
  stroke: var(--camino-orange-soft);
  stroke-width: 7;
  stroke-linecap: round;
}

.camino-hero__pain-lines {
  animation: caminoPainPulse var(--camino-loop) ease-in-out infinite;
}

.camino-hero__road-glow {
  opacity: 0;
  animation: caminoRoadReveal var(--camino-loop) ease-in-out infinite;
}

.camino-hero__road-stroke {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.camino-hero__road-stroke--outer {
  stroke: rgba(182, 222, 255, 0.55);
  stroke-width: 24;
}

.camino-hero__road-stroke--inner {
  stroke: rgba(255, 255, 255, 0.7);
  stroke-width: 8;
}

.camino-hero__road-mask-path {
  stroke-dasharray: 1800;
  stroke-dashoffset: 1800;
  animation: caminoRoadMaskDraw var(--camino-loop) ease-in-out infinite;
}

.camino-hero__vignette {
  fill: url(#none);
  pointer-events: none;
  opacity: 1;
  fill: transparent;
  box-shadow: none;
}

.camino-hero__vignette {
  fill: rgba(0, 0, 0, 0);
}

.camino-hero__overlay--scene1::before {
  content: "";
}

/* Reduced-motion label hidden in normal mode */
.camino-hero__reduced-label {
  opacity: 0;
  pointer-events: none;
}

.camino-hero__reduced-label rect {
  fill: rgba(10, 33, 74, 0.82);
  stroke: rgba(255, 255, 255, 0.18);
  stroke-width: 2;
}

.camino-hero__reduced-label text:first-of-type {
  fill: #ffffff;
  font-size: 36px;
  font-weight: 700;
  font-family: Arial, Helvetica, sans-serif;
}

.camino-hero__reduced-label text:last-of-type {
  fill: rgba(255, 255, 255, 0.92);
  font-size: 24px;
  font-weight: 500;
  font-family: Arial, Helvetica, sans-serif;
}

.camino-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, transparent 52%, rgba(10, 30, 66, 0.08) 78%, rgba(10, 30, 66, 0.18) 100%);
}

/* ---------- Timeline keyframes ---------- */

/* Scene 1 occupies the first portion of the 20-second timeline */
@keyframes caminoScene1Visibility {
  0%,
  18% {
    opacity: 1;
  }
  21%,
  100% {
    opacity: 0;
  }
}

@keyframes caminoScene1Push {
  0% {
    transform: scale(1) translateX(0px) translateY(0px);
  }
  8% {
    transform: scale(1.014) translateX(-6px) translateY(-2px);
  }
  16% {
    transform: scale(1.026) translateX(-14px) translateY(-6px);
  }
  20% {
    transform: scale(1.04) translateX(-24px) translateY(-10px);
  }
  100% {
    transform: scale(1.04) translateX(-24px) translateY(-10px);
  }
}

@keyframes caminoSmokeRise1 {
  0%,
  2% {
    transform: translateY(10px);
    opacity: 0;
  }

  5% {
    transform: translateY(0px);
    opacity: 0.72;
  }

  11% {
    transform: translateY(-22px);
    opacity: 0.6;
  }

  18% {
    transform: translateY(-46px);
    opacity: 0.18;
  }

  20%,
  100% {
    transform: translateY(-58px);
    opacity: 0;
  }
}

@keyframes caminoSmokeRise2 {
  0%,
  3% {
    transform: translateY(12px);
    opacity: 0;
  }

  6% {
    transform: translateY(0px);
    opacity: 0.56;
  }

  12% {
    transform: translateY(-24px);
    opacity: 0.44;
  }

  18% {
    transform: translateY(-50px);
    opacity: 0.12;
  }

  20%,
  100% {
    transform: translateY(-62px);
    opacity: 0;
  }
}

@keyframes caminoDizzyOrbit {
  0%,
  2% {
    transform: rotate(-10deg);
    opacity: 0;
  }
  5% {
    transform: rotate(0deg);
    opacity: 0.72;
  }
  10% {
    transform: rotate(5deg);
    opacity: 0.78;
  }
  15% {
    transform: rotate(-4deg);
    opacity: 0.72;
  }
  18% {
    transform: rotate(8deg);
    opacity: 0.62;
  }
  20%,
  100% {
    transform: rotate(10deg);
    opacity: 0;
  }
}

@keyframes caminoStarPulse1 {
  0%,
  3% {
    opacity: 0;
    transform: translate(1145px, 226px) scale(0.7) rotate(0deg);
  }
  6% {
    opacity: 1;
    transform: translate(1145px, 226px) scale(1) rotate(12deg);
  }
  10% {
    opacity: 0.9;
    transform: translate(1138px, 220px) scale(1.1) rotate(25deg);
  }
  15% {
    opacity: 0.8;
    transform: translate(1148px, 230px) scale(0.94) rotate(42deg);
  }
  19% {
    opacity: 0;
    transform: translate(1155px, 220px) scale(0.7) rotate(52deg);
  }
  100% {
    opacity: 0;
    transform: translate(1155px, 220px) scale(0.7) rotate(52deg);
  }
}

@keyframes caminoStarPulse2 {
  0%,
  4% {
    opacity: 0;
    transform: translate(1265px, 225px) scale(0.65) rotate(0deg);
  }
  7% {
    opacity: 1;
    transform: translate(1265px, 225px) scale(1) rotate(-10deg);
  }
  12% {
    opacity: 0.92;
    transform: translate(1270px, 216px) scale(1.08) rotate(8deg);
  }
  16% {
    opacity: 0.72;
    transform: translate(1260px, 228px) scale(0.92) rotate(28deg);
  }
  19%,
  100% {
    opacity: 0;
    transform: translate(1276px, 220px) scale(0.68) rotate(38deg);
  }
}

@keyframes caminoStarPulse3 {
  0%,
  5% {
    opacity: 0;
    transform: translate(1360px, 258px) scale(0.72) rotate(0deg);
  }
  8% {
    opacity: 1;
    transform: translate(1360px, 258px) scale(1) rotate(10deg);
  }
  12% {
    opacity: 0.9;
    transform: translate(1350px, 248px) scale(1.1) rotate(20deg);
  }
  16% {
    opacity: 0.72;
    transform: translate(1364px, 264px) scale(0.9) rotate(38deg);
  }
  19%,
  100% {
    opacity: 0;
    transform: translate(1368px, 250px) scale(0.7) rotate(48deg);
  }
}

@keyframes caminoPainPulse {
  0%,
  4% {
    opacity: 0;
    transform: scale(0.92);
  }
  7% {
    opacity: 0.85;
    transform: scale(1);
  }
  10% {
    opacity: 1;
    transform: scale(1.06);
  }
  13% {
    opacity: 0.75;
    transform: scale(0.97);
  }
  16% {
    opacity: 1;
    transform: scale(1.04);
  }
  19% {
    opacity: 0;
    transform: scale(1.1);
  }
  100% {
    opacity: 0;
    transform: scale(1.1);
  }
}

@keyframes caminoRoadMaskDraw {
  0% {
    stroke-dashoffset: 1800;
  }
  3% {
    stroke-dashoffset: 1800;
  }
  11% {
    stroke-dashoffset: 920;
  }
  18% {
    stroke-dashoffset: 0;
  }
  20%,
  100% {
    stroke-dashoffset: 0;
  }
}

@keyframes caminoRoadReveal {
  0%,
  2% {
    opacity: 0;
  }
  6% {
    opacity: 0.72;
  }
  12% {
    opacity: 0.92;
  }
  18% {
    opacity: 0.85;
  }
  20%,
  100% {
    opacity: 0;
  }
}



      
/* ---------- Scene 2: Reach out to CaminoSLC.com ---------- */

.camino-hero__overlay--scene2 {
  opacity: 0;
  pointer-events: none;
  animation: caminoScene2Visibility var(--camino-loop) linear infinite;
}

.camino-hero__phone-glow {
  fill: rgba(155, 214, 255, 0.26);
  filter: url(#caminoGlow);
  transform-origin: 1188px 570px;
  animation: caminoPhoneGlow var(--camino-loop) ease-in-out infinite;
}

.camino-hero__phone-ui {
  transform-origin: 1192px 565px;
  animation: caminoPhoneUIFocus var(--camino-loop) ease-in-out infinite;
}

.camino-hero__phone-screen {
  fill: rgba(255, 255, 255, 0.965);
}

.camino-hero__address-bar {
  fill: #eef1f5;
}

.camino-hero__lock-icon rect {
  fill: #8b97a8;
}

.camino-hero__lock-icon path {
  fill: none;
  stroke: #8b97a8;
  stroke-width: 4;
  stroke-linecap: round;
}

.camino-hero__address-text {
  fill: #142d62;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.1px;
}

.camino-hero__phone-c {
  fill: none;
  stroke: #123f8b;
  stroke-width: 15;
  stroke-linecap: round;
  stroke-dasharray: 150;
  stroke-dashoffset: 150;
  animation: caminoPhoneCDraw var(--camino-loop) ease-in-out infinite;
}

.camino-hero__phone-logo-text {
  fill: #123f8b;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 56px;
  font-weight: 800;
  letter-spacing: 0.2px;
}

.camino-hero__phone-main-text {
  fill: #17845d;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 70px;
  font-weight: 900;
  letter-spacing: 1px;
}

.camino-hero__phone-sub-text {
  fill: #17845d;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 1px;
}

.camino-hero__submit-button {
  transform-origin: 1192px 833px;
  animation: caminoSubmitTap var(--camino-loop) ease-in-out infinite;
}

.camino-hero__submit-button rect {
  fill: #123f8b;
}

.camino-hero__submit-check-circle {
  fill: none;
  stroke: #ffffff;
  stroke-width: 6;
}

.camino-hero__submit-check {
  fill: none;
  stroke: #ffffff;
  stroke-width: 7;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 56;
  stroke-dashoffset: 56;
  animation: caminoSubmitCheckDraw var(--camino-loop) ease-in-out infinite;
}

.camino-hero__submit-dots {
  fill: none;
  stroke: rgba(255, 255, 255, 0.86);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 2 16;
  animation: caminoSubmitDots var(--camino-loop) ease-in-out infinite;
}

.camino-hero__paper-plane {
  fill: #ffffff;
  transform-origin: 1260px 821px;
  animation: caminoPaperPlaneButton var(--camino-loop) ease-in-out infinite;
}

.camino-hero__big-c-wrap {
  transform-origin: 1202px 146px;
  animation: caminoBigCPulse var(--camino-loop) ease-in-out infinite;
}

.camino-hero__big-c-halo {
  fill: rgba(255, 255, 255, 0.26);
  filter: url(#caminoGlow);
  opacity: 0;
  animation: caminoBigCHalo var(--camino-loop) ease-in-out infinite;
}

.camino-hero__big-c {
  fill: none;
  stroke: #123f8b;
  stroke-width: 22;
  stroke-linecap: round;
  stroke-dasharray: 250;
  stroke-dashoffset: 250;
  filter: url(#caminoGlow);
  animation: caminoBigCDraw var(--camino-loop) ease-in-out infinite;
}

.camino-hero__big-c-rays path {
  fill: none;
  stroke: rgba(255, 255, 255, 0.82);
  stroke-width: 6;
  stroke-linecap: round;
  opacity: 0;
  animation: caminoBigCRays var(--camino-loop) ease-in-out infinite;
}

.camino-hero__send-path {
  fill: none;
  stroke: #123f8b;
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 2 18;
  opacity: 0;
  animation: caminoSendPathDraw var(--camino-loop) ease-in-out infinite;
}

.camino-hero__send-burst path,
.camino-hero__send-burst circle {
  fill: none;
  stroke: rgba(255, 255, 255, 0.9);
  stroke-width: 4;
  stroke-linecap: round;
}

.camino-hero__send-burst {
  opacity: 0;
  filter: url(#caminoGlow);
  animation: caminoSendBurst var(--camino-loop) ease-in-out infinite;
}

.camino-hero__send-plane {
  fill: #ffffff;
  filter: url(#caminoGlow);
  opacity: 0;
  transform-origin: center center;
  animation: caminoSendPlaneMove var(--camino-loop) ease-in-out infinite;
}

.camino-hero__scene2-transition-sweep {
  opacity: 0;
  animation: caminoScene2SweepReveal var(--camino-loop) ease-in-out infinite;
}

.camino-hero__scene2-transition-road {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.camino-hero__scene2-transition-road--outer {
  stroke: rgba(173, 220, 255, 0.8);
  stroke-width: 56;
  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;
  filter: url(#caminoGlow);
  animation: caminoScene2RoadOutOuter var(--camino-loop) ease-in-out infinite;
}

.camino-hero__scene2-transition-road--inner {
  stroke: rgba(255, 255, 255, 0.95);
  stroke-width: 16;
  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;
  animation: caminoScene2RoadOutInner var(--camino-loop) ease-in-out infinite;
}



      
@keyframes caminoScene2Visibility {
  0%,
  17% {
    opacity: 0;
  }

  19% {
    opacity: 1;
  }

  100% {
    opacity: 1;
  }
}

@keyframes caminoScene2Push {
  0%,
  18% {
    transform: scale(1.035) translateX(12px) translateY(0px);
  }

  24% {
    transform: scale(1.015) translateX(4px) translateY(0px);
  }

  34%,
  100% {
    transform: scale(1.02) translateX(-4px) translateY(-2px);
  }
}

@keyframes caminoPhoneUIFocus {
  0%,
  18% {
    opacity: 0;
    transform: translateY(22px) rotate(-2.2deg) scale(0.94);
  }

  21% {
    opacity: 1;
    transform: translateY(0px) rotate(-2.2deg) scale(1.025);
  }

  26% {
    opacity: 1;
    transform: translateY(0px) rotate(-2.2deg) scale(1);
  }

  100% {
    opacity: 1;
    transform: translateY(0px) rotate(-2.2deg) scale(1);
  }
}

@keyframes caminoPhoneGlow {
  0%,
  19% {
    opacity: 0;
    transform: rotate(-2.2deg) scale(0.94);
  }

  23% {
    opacity: 0.74;
    transform: rotate(-2.2deg) scale(1.02);
  }

  31% {
    opacity: 0.34;
    transform: rotate(-2.2deg) scale(1);
  }

  100% {
    opacity: 0.2;
    transform: rotate(-2.2deg) scale(1);
  }
}

@keyframes caminoPhoneCDraw {
  0%,
  20% {
    stroke-dashoffset: 150;
  }

  25%,
  100% {
    stroke-dashoffset: 0;
  }
}

@keyframes caminoBigCHalo {
  0%,
  21% {
    opacity: 0;
    transform: scale(0.9);
  }

  26% {
    opacity: 1;
    transform: scale(1);
  }

  34%,
  100% {
    opacity: 0.5;
    transform: scale(1);
  }
}

@keyframes caminoBigCDraw {
  0%,
  19% {
    opacity: 0;
    stroke-dashoffset: 250;
  }

  22% {
    opacity: 1;
  }

  28%,
  100% {
    opacity: 1;
    stroke-dashoffset: 0;
  }
}

@keyframes caminoBigCPulse {
  0%,
  25% {
    transform: scale(1);
  }

  29% {
    transform: scale(1.03);
  }

  33%,
  100% {
    transform: scale(1);
  }
}

@keyframes caminoBigCRays {
  0%,
  24% {
    opacity: 0;
  }

  28% {
    opacity: 1;
  }

  34% {
    opacity: 0.6;
  }

  100% {
    opacity: 0.45;
  }
}

@keyframes caminoSubmitTap {
  0%,
  24% {
    transform: scale(1);
  }

  26% {
    transform: scale(0.95);
  }

  28% {
    transform: scale(1.04);
  }

  31%,
  100% {
    transform: scale(1);
  }
}

@keyframes caminoSubmitCheckDraw {
  0%,
  25% {
    stroke-dashoffset: 56;
  }

  29%,
  100% {
    stroke-dashoffset: 0;
  }
}

@keyframes caminoSubmitDots {
  0%,
  26% {
    opacity: 0.25;
    stroke-dashoffset: 40;
  }

  30% {
    opacity: 1;
    stroke-dashoffset: 0;
  }

  36%,
  100% {
    opacity: 0.75;
    stroke-dashoffset: -26;
  }
}

@keyframes caminoPaperPlaneButton {
  0%,
  26% {
    transform: translateX(0px) translateY(0px) rotate(0deg) scale(1);
    opacity: 1;
